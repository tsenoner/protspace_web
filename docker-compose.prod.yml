# Production overlay. Apply on top of docker-compose.yml on the deployment VM:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#     --env-file .env up -d
#
# Tags and the SPA origin allowed by CORS come from .env (see .env.example).
# TLS is terminated upstream by the lab edge gateway; this Caddy listens on
# plain HTTP and is reached over the lab network only.

services:
  protspace-prep:
    image: ghcr.io/tsenoner/protspace-prep:${PREP_TAG:?PREP_TAG must be set}
    pull_policy: always
    build: !reset null

  caddy:
    image: ghcr.io/tsenoner/caddy-ratelimit:${CADDY_TAG:?CADDY_TAG must be set}
    pull_policy: always
    build: !reset null
    environment:
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:?CORS_ALLOWED_ORIGIN must be set}
    ports: !override
      - '0.0.0.0:8080:80'
    volumes:
      - ./config/Caddyfile.prod:/etc/caddy/Caddyfile:ro
